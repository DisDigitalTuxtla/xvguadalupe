<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis XV - Guadalupe</title>

    <meta property="og:title" content="¡Estás invitado a mis XV años! - Guadalupe">
    <meta property="og:description" content="Acompáñame a celebrar este día tan especial.">
    <meta property="og:image" content="https://xvguadalupe.netlify.app/hoja1.jpg"> 
    <meta property="og:url" content="https://xvguadalupe.netlify.app/">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { margin: 0; background-color: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: pan-y; }
        
        #overlay {
            position: fixed; inset: 0; background: radial-gradient(circle, #2c2512 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; color: #d4af37; text-align: center;
        }
        #start-btn {
            padding: 18px 40px; font-size: 1.1rem; background: transparent;
            border: 2px solid #d4af37; color: #d4af37; cursor: pointer;
            border-radius: 30px; letter-spacing: 2px;
        }

        #invitation-container { display: none; width: 100vw; height: 100vh; }
        .swiper { width: 100%; height: 100%; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; background: #000; position: relative; }
        .swiper-slide img { max-width: 100%; max-height: 100%; object-fit: contain; }

        #countdown {
            position: absolute; top: 46%; width: 100%; text-align: center;
            color: #8d702a; font-weight: bold; font-size: 1.4rem; z-index: 10;
        }

        /* BOTONES CON COLOR PARA AJUSTE */
        .hotspot { 
            position: absolute; 
            z-index: 50; 
            background: transparent; /* rgba(255, 0, 0, 0.4);  ROJO ACTIVO */
            border: none; /*2px solid red;*/
            border-radius: 8px;
        }

        /* Hoja 4: Ubicaciones */
        #btn-iglesia { top: 45%; left: 22%; width: 56%; height: 6.5%; }
        /* Bajamos Recepción de 72% a 74% según tu observación */
        #btn-recepcion { top: 62%; left: 22%; width: 56%; height: 10%; }

        /* Hoja 5: WhatsApp */
        /* Bajamos WhatsApp de 75% a 77% para que no quede arriba */
        #btn-whatsapp { top: 65%; left: 22%; width: 56%; height: 10%; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="font-weight: 300; letter-spacing: 5px;">GUADALUPE</h1>
        <p style="margin-bottom: 40px; opacity: 0.8;">XV AÑOS</p>
        <button id="start-btn">ENTRAR</button>
    </div>

    <audio id="bg-music" loop><source src="musica.mp3" type="audio/mpeg"></audio>

    <div id="invitation-container">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="hoja1.jpg"></div>
                <div class="swiper-slide"><img src="hoja2.jpg"></div>
                <div class="swiper-slide">
                    <img src="hoja3.jpg">
                    <div id="countdown"></div>
                </div>
                <div class="swiper-slide">
                    <img src="hoja4.jpg">
                    <a href="https://maps.app.goo.gl/TWJKeqo5aoVsDrY6A?g_st=aw" target="_blank" class="hotspot" id="btn-iglesia"></a>
                    <a href="https://www.google.com/maps/search/Quinta%20San%20Antonio/@16.72874807,-93.18266252,17z?hl=es" target="_blank" class="hotspot" id="btn-recepcion"></a>
                </div>
                <div class="swiper-slide">
                    <img src="hoja5.jpg">
                    /*<a href="https://wa.me/qr/52MNA6ARQECHK1?text=Hola,%20confirmo%20mi%20asistencia" target="_blank" class="hotspot" id="btn-whatsapp"></a>*/
	              <a href="https://wa.me/qr/52MNA6ARQECHK1?text=Hola%2C%20confirmo%20mi%20asistencia" target="_blank" class="hotspot" id="btn-whatsapp"></a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const btn = document.getElementById('start-btn');
        const music = document.getElementById('bg-music');

        btn.addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('invitation-container').style.display = 'block';
            music.play();

            new Swiper(".mySwiper", {
                effect: "slide", 
                grabCursor: true,
                centeredSlides: true,
                slidesPerView: 1
            });
        });

        function updateCountdown() {
            const diff = new Date('April 25, 2026 19:00:00') - new Date();
            if (diff <= 0) {
                document.getElementById('countdown').innerHTML = "¡Es hoy!";
                return;
            }
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            const pad = (num) => num.toString().padStart(2, '0');
            document.getElementById('countdown').innerHTML = `${pad(d)}d : ${pad(h)}h : ${pad(m)}m : ${pad(s)}s`;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown(); 
    </script>
</body>
</html>
